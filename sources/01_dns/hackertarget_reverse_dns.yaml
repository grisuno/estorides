name: hackertarget_reverse_dns
enabled: true
category: 01. DNS Intelligence
description: Reverse IP→host lookup (virtual host discovery)
os: any
requires_key: false
parser: text_lines
entity_hints:
- domain
applies_to:
- ipv4
tool:
  method: GET
  url: https://api.hackertarget.com/reverseiplookup/
  headers:
    User-Agent: Estorides/1.0
  params:
    q: '{query}'
