name: hackertarget_reverseiplookup
enabled: true
category: 01. DNS Intelligence
description: HackerTarget reverse IP lookup — given an IP, returns every domain hosted on it. Critical for finding sibling domains of a target without doing DNS brute force.
os: any
requires_key: false
parser: text_lines
entity_hints:
- domain
applies_to:
- ip
tool:
  method: GET
  url: https://api.hackertarget.com/reverseiplookup/
  headers:
    User-Agent: Estorides/1.0
  params:
    q: '{query}'
