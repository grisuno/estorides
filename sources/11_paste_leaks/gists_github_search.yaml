name: gists_github_search
enabled: true
category: 11. Paste & Leaks
description: GitHub Gist search (public gists)
os: any
requires_key: false
parser: github_search
entity_hints:
- gist
- code
- secret
applies_to:
- keyword
tool:
  method: GET
  url: https://api.github.com/search/code
  headers:
    Accept: application/vnd.github.v3+json
    User-Agent: Estorides/1.0
  params:
    q: '{query} extension:gist'
    per_page: 20
