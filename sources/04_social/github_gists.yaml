name: github_gists
enabled: true
category: 04. Social Media
description: GitHub gists (often leak credentials, configs, scripts)
os: any
requires_key: false
parser: github_search
entity_hints:
- repository
- secret
- code
applies_to:
- keyword
tool:
  method: GET
  url: https://api.github.com/search/code
  headers:
    Accept: application/vnd.github.v3+json
    User-Agent: Estorides/1.0
  params:
    q: user:{query}
    per_page: 20
