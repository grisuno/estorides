name: hackertarget_nping
enabled: true
category: 03. Web Intelligence
description: HackerTarget TCP ping — reachability test
os: any
requires_key: false
parser: text_lines
entity_hints:
- ip
- port
- status
applies_to:
- ipv4
- domain
tool:
  method: GET
  url: https://api.hackertarget.com/nping/
  headers:
    User-Agent: Estorides/1.0
  params:
    q: '{query}'
