name: hackertarget_traceroute
enabled: true
category: 03. Web Intelligence
description: Traceroute / network path to host
os: any
requires_key: false
parser: text_lines
entity_hints:
- ip
- asn_hop
applies_to:
- ipv4
- domain
tool:
  method: GET
  url: https://api.hackertarget.com/mtr/
  headers:
    User-Agent: Estorides/1.0
  params:
    q: '{query}'
